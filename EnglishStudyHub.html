<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Study Hub (v2.7)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #000000; 
            color: #F3F4F6;
            background-image: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.9)), url('fondo.webp');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .main-button, .topic-button, .difficulty-btn { 
            transition: all 0.2s ease-in-out; 
        }
        .main-button:hover, .topic-button:hover, .difficulty-btn:hover { 
            transform: translateY(-4px); 
            box-shadow: 0 8px 12px rgba(156, 163, 175, 0.1); 
        }
        .correct { color: #22c55e; border-color: #22c55e; }
        .incorrect { color: #ef4444; border-color: #ef4444; }
        input[type="text"]:focus { outline: none; border-color: #9ca3af; box-shadow: 0 0 0 2px rgba(156, 163, 175, 0.4); }
        .transparent-btn {
            background-color: rgba(17, 24, 39, 0.6); 
            border: 1px solid rgba(55, 65, 81, 0.8);
        }
        .transparent-btn:hover {
            background-color: rgba(31, 41, 55, 0.8); 
            border-color: rgba(75, 85, 99, 1);
        }
    </style>
</head>
<body class="antialiased p-4 md:p-8">

    <div id="main-container" class="min-h-[80vh] flex flex-col justify-center">
        <header id="main-header" class="text-center mb-10">
            <h1 class="text-3xl md:text-4xl font-bold text-white">English Study Hub</h1>
            <p class="text-lg text-gray-400 mt-2">Selecciona un tema y un nivel de dificultad para practicar.</p>
            <a href="index.html" class="text-sky-400 hover:text-sky-300 mt-4 inline-block">&larr; Volver al Portal Principal</a>
        </header>
        <div id="topics-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 md:gap-6 max-w-7xl mx-auto w-full">
        </div>
    </div>

    <div id="difficulty-modal" class="hidden fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center p-4 z-50"><div class="bg-gray-900 border border-gray-700 rounded-xl shadow-2xl p-8 max-w-sm w-full"><h3 id="modal-topic-title" class="text-2xl font-bold text-center mb-6 text-white"></h3><div class="space-y-4"><button data-difficulty="básico" class="difficulty-btn w-full bg-gray-600 hover:bg-gray-500 font-bold py-3 rounded-lg">Básico</button><button data-difficulty="intermedio" class="difficulty-btn w-full bg-gray-700 hover:bg-gray-600 font-bold py-3 rounded-lg">Intermedio</button><button data-difficulty="avanzado" class="difficulty-btn w-full bg-gray-800 hover:bg-gray-700 font-bold py-3 rounded-lg">Avanzado</button></div><button id="modal-close-btn" class="mt-6 w-full bg-gray-600 hover:bg-gray-700 font-bold py-2 rounded-lg">Cancelar</button></div></div>

    <div id="quiz-container" class="hidden container mx-auto p-4 md:p-8 max-w-5xl">
        <div class="p-6 bg-gray-900/80 backdrop-blur-sm rounded-xl shadow-lg border border-gray-700">
            <div class="flex justify-between items-center mb-6"><h2 id="quiz-title" class="text-2xl font-bold text-white"></h2><button id="close-quiz-btn" class="bg-gray-700 hover:bg-gray-600 text-white font-bold py-2 px-4 rounded-lg transition-colors">&larr; Volver a Temas</button></div>
            <div id="question-area"><p id="progress-text" class="text-gray-400 mb-2"></p><div class="w-full bg-gray-700 rounded-full h-2.5 mb-4"><div id="progress-bar" class="bg-sky-500 h-2.5 rounded-full" style="width: 0%"></div></div><div id="topic-tag-area" class="mb-3 h-6"></div><div id="question-text" class="text-xl mb-4 leading-relaxed"></div><div id="answer-area"></div><div id="feedback-area" class="mt-4 text-lg font-medium h-10"></div></div>
            <div id="results-area" class="hidden text-center"><h3 class="text-3xl font-bold text-white mb-4">¡Cuestionario completado!</h3><p class="text-xl text-gray-300 mb-2">Tu puntuación final es:</p><p id="final-score" class="text-5xl font-bold text-sky-400 mb-8"></p><button id="restart-quiz-btn" class="bg-sky-600 hover:bg-sky-700 text-white font-bold py-3 px-6 rounded-lg transition-colors">Intentar de Nuevo</button></div>
            <div class="mt-6 flex justify-end"><button id="check-btn" class="bg-green-700 hover:bg-green-600 text-white font-bold py-2 px-5 rounded-lg transition-colors">Verificar</button><button id="next-btn" class="bg-sky-600 hover:bg-sky-700 text-white font-bold py-2 px-5 rounded-lg transition-colors hidden">Siguiente &rarr;</button></div>
        </div>
    </div>

    <script src="english_questions.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let currentQuiz = [], currentQuestionIndex = 0, score = 0, currentTopicName = '', currentDifficulty = '', quizState = 'answering', keydownLocked = false;
            const topicsGrid = document.getElementById('topics-grid'), quizContainer = document.getElementById('quiz-container'), mainContainer = document.getElementById('main-container'), difficultyModal = document.getElementById('difficulty-modal'), modalTopicTitle = document.getElementById('modal-topic-title'), modalCloseBtn = document.getElementById('modal-close-btn'), quizTitle = document.getElementById('quiz-title'), closeQuizBtn = document.getElementById('close-quiz-btn'), questionArea = document.getElementById('question-area'), resultsArea = document.getElementById('results-area'), questionText = document.getElementById('question-text'), answerArea = document.getElementById('answer-area'), topicTagArea = document.getElementById('topic-tag-area'), feedbackArea = document.getElementById('feedback-area'), checkBtn = document.getElementById('check-btn'), nextBtn = document.getElementById('next-btn'), progressText = document.getElementById('progress-text'), progressBar = document.getElementById('progress-bar'), finalScore = document.getElementById('final-score'), restartQuizBtn = document.getElementById('restart-quiz-btn');

            function createTopicButtons() {
                topicsGrid.innerHTML = '';
                Object.keys(exercisesData).forEach(topicName => {
                    const button = document.createElement('button');
                    button.className = 'topic-button transparent-btn text-white font-semibold py-4 px-2 rounded-lg text-center';
                    button.textContent = topicName;
                    button.addEventListener('click', () => showDifficultyModal(topicName));
                    topicsGrid.appendChild(button);
                });
                const shuffleButton = document.createElement('button');
                shuffleButton.className = 'topic-button transparent-btn text-white font-semibold py-4 px-2 rounded-lg text-center';
                shuffleButton.textContent = '🧠 Shuffle';
                shuffleButton.addEventListener('click', () => showDifficultyModal('Shuffle'));
                topicsGrid.appendChild(shuffleButton);
            }
            function showDifficultyModal(topicName) { modalTopicTitle.textContent = topicName; currentTopicName = topicName; difficultyModal.classList.remove('hidden'); setTimeout(() => difficultyModal.classList.remove('opacity-0'), 10); }
            function hideDifficultyModal() { difficultyModal.classList.add('opacity-0'); setTimeout(() => difficultyModal.classList.add('hidden'), 300); }
            function startShuffleQuiz(difficulty) { hideDifficultyModal(); let allQuestions = []; for (const topicName in exercisesData) { const topicQuestions = exercisesData[topicName]; let questionsToUse; if (difficulty === 'básico') { questionsToUse = topicQuestions.slice(0, 30); } else if (difficulty === 'intermedio') { questionsToUse = topicQuestions.slice(0, 50); } else { questionsToUse = topicQuestions.slice(0, 60); } const taggedQuestions = questionsToUse.map(q => ({ ...q, topic: topicName })); allQuestions = allQuestions.concat(taggedQuestions); } const shuffled = allQuestions.sort(() => Math.random() - 0.5); currentQuiz = shuffled.slice(0, 25); currentTopicName = 'Shuffle'; currentDifficulty = difficulty; currentQuestionIndex = 0; score = 0; const difficultyCapitalized = difficulty.charAt(0).toUpperCase() + difficulty.slice(1); setupQuizView(`Shuffle - ${difficultyCapitalized} (25 Preguntas)`); }
            function startQuiz(difficulty) { hideDifficultyModal(); currentDifficulty = difficulty; const questionPool = exercisesData[currentTopicName]; let questionsToUse; if (difficulty === 'básico') { questionsToUse = questionPool.slice(0, 30); } else if (difficulty === 'intermedio') { questionsToUse = questionPool.slice(0, 50); } else { questionsToUse = questionPool.slice(0, 60); } const shuffledQuiz = [...questionsToUse].sort(() => Math.random() - 0.5); currentQuiz = shuffledQuiz.slice(0, 10); currentQuestionIndex = 0; score = 0; const difficultyCapitalized = difficulty.charAt(0).toUpperCase() + difficulty.slice(1); setupQuizView(`${currentTopicName} - ${difficultyCapitalized} (10 Preguntas)`); }
            function setupQuizView(title) { mainContainer.classList.add('hidden'); quizContainer.classList.remove('hidden'); resultsArea.classList.add('hidden'); questionArea.classList.remove('hidden'); quizTitle.textContent = `Cuestionario: ${title}`; displayQuestion(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
            function displayQuestion() {
                quizState = 'answering'; const question = currentQuiz[currentQuestionIndex];
                progressText.textContent = `Pregunta ${currentQuestionIndex + 1} de ${currentQuiz.length}`; progressBar.style.width = `${((currentQuestionIndex + 1) / currentQuiz.length) * 100}%`;
                questionText.innerHTML = ''; answerArea.innerHTML = ''; topicTagArea.innerHTML = '';
                if (currentTopicName === 'Shuffle' && question.topic) { topicTagArea.innerHTML = `<span class="bg-purple-600 text-white text-xs font-semibold px-2.5 py-1 rounded-full">${question.topic}</span>`; }
                const parts = question.q.split('___');
                if (parts.length > 1) {
                    let html = parts.map((part, i) => i < parts.length - 1 ? `<span>${part}</span><input type="text" class="answer-input w-24 p-2 bg-gray-700 border-2 border-gray-600 rounded-md text-white mx-2" placeholder="...">` : `<span>${part}</span>`).join('');
                    questionText.innerHTML = html;
                } else {
                    questionText.textContent = question.q;
                    answerArea.innerHTML = `<input type="text" class="answer-input w-full p-2 bg-gray-700 border-2 border-gray-600 rounded-md text-white mt-2" placeholder="Escribe tu respuesta aquí...">`;
                }
                feedbackArea.textContent = '';
                document.querySelectorAll('.answer-input').forEach(input => { input.classList.remove('correct', 'incorrect'); input.disabled = false; });
                checkBtn.classList.remove('hidden'); nextBtn.classList.add('hidden');
                document.querySelector('.answer-input')?.focus();
            }
            function checkAnswer() {
                if (quizState !== 'answering') return; quizState = 'feedback';
                const question = currentQuiz[currentQuestionIndex]; const inputs = document.querySelectorAll('.answer-input'); const userAnswers = Array.from(inputs).map(input => input.value.trim().toLowerCase());
                const correctAnswers = question.a.split('/').map(a => a.trim().toLowerCase()); const altAnswers = question.alt ? question.alt.split('/').map(a => a.trim().toLowerCase()) : null;
                let isCorrect = userAnswers.join('/') === correctAnswers.join('/'); if (!isCorrect && altAnswers) { isCorrect = userAnswers.join('/') === altAnswers.join('/'); }
                if (isCorrect) { feedbackArea.textContent = '¡Correcto!'; feedbackArea.className = 'mt-4 text-lg font-medium h-10 correct'; inputs.forEach(input => input.classList.add('correct')); score++; } else { feedbackArea.innerHTML = `Incorrecto. La respuesta correcta es: <strong class="text-white">${question.a.replace(/\//g, ' / ')}</strong>`; feedbackArea.className = 'mt-4 text-lg font-medium h-10 incorrect'; inputs.forEach(input => input.classList.add('incorrect')); }
                inputs.forEach(input => input.disabled = true); checkBtn.classList.add('hidden'); nextBtn.classList.remove('hidden'); nextBtn.focus();
            }
            function nextQuestion() { if (quizState !== 'feedback') return; currentQuestionIndex++; if (currentQuestionIndex < currentQuiz.length) { displayQuestion(); } else { showFinalScore(); } }
            function showFinalScore() { questionArea.classList.add('hidden'); resultsArea.classList.remove('hidden'); checkBtn.classList.add('hidden'); nextBtn.classList.add('hidden'); finalScore.textContent = `${score} / ${currentQuiz.length}`; }
            function closeQuiz() { quizContainer.classList.add('hidden'); mainContainer.classList.remove('hidden'); hideDifficultyModal(); }
            checkBtn.addEventListener('click', checkAnswer);
            nextBtn.addEventListener('click', nextQuestion);
            closeQuizBtn.addEventListener('click', closeQuiz);
            modalCloseBtn.addEventListener('click', hideDifficultyModal);
            difficultyModal.addEventListener('click', (e) => { if(e.target.classList.contains('difficulty-btn')) { const difficulty = e.target.dataset.difficulty; if (currentTopicName === 'Shuffle') { startShuffleQuiz(difficulty); } else { startQuiz(difficulty); } } });
            restartQuizBtn.addEventListener('click', () => { if (currentTopicName === 'Shuffle') { startShuffleQuiz(currentDifficulty); } else { startQuiz(currentDifficulty); } });
            document.addEventListener('keydown', (event) => { if (keydownLocked) return; if(!difficultyModal.classList.contains('hidden')) { if (event.key === 'Escape') { hideDifficultyModal(); } return; } if(quizContainer.classList.contains('hidden')) return; if (event.key === 'Escape') { closeQuiz(); } if (event.key === 'Enter' || event.key === 'ArrowRight') { event.preventDefault(); keydownLocked = true; if (quizState === 'answering' && !checkBtn.classList.contains('hidden')) { checkBtn.click(); } else if (quizState === 'feedback' && !nextBtn.classList.contains('hidden')) { nextBtn.click(); } setTimeout(() => { keydownLocked = false; }, 200); } });
            createTopicButtons();
        });
    </script>
</body>
</html>
